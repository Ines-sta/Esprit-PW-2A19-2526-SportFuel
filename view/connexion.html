<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SportFuel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .panel.signup-mode { transform: translateX(-100%); }
        .image-area {
            background-image: url('img1.png') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }
    </style>
</head>
<body>
    <div class="panel" id="connexionPanel">
        <div class="image-area">
            <h3>Start your healthy journey</h3>
            <p class="toggle-text">Bienvenue chez SportFuel</p>
        </div>
        <div class="content">
            <div class="form-box">
                <h2>Connexion</h2>
                <form id="connexionForm" action="../controller/AuthController.php?action=connexion" method="POST" novalidate>
                    <input type="text" name="email" id="email" placeholder="📧 Email">
                    <input type="password" name="password" id="password" placeholder="🔒 Mot de passe">
                    <button type="submit">Se connecter</button>
                </form>
                <a class="link-btn" href="inscription.html">Pas de compte ? S'inscrire</a>
            </div>
        </div>
    </div>
    <script src="connexion.js"></script>
</body>
</html>
