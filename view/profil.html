<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - SportFuel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="panel">
        <div class="content">
            <div class="form-box" style="text-align: center;">
                <img src="https://source.unsplash.com/150x150/?person,athlete" alt="Photo de profil" style="width: 140px; height: 140px; border-radius: 50%; margin-bottom: 20px; border: 4px solid #f4a261;">
                <input type="text" id="nom" value="Nom" readonly>
                <input type="email" id="email" value="email@example.com" readonly>
                <input type="text" id="details" value="Age / Poids / Taille" readonly>
                <button id="modifier">Modifier</button>
                <button id="deconnexion">Déconnexion</button>
            </div>
        </div>
        <div class="image-area">
            <h3>Profil sportif</h3>
        </div>
    </div>
    <script>
        document.getElementById('modifier').addEventListener('click', function() {
            const inputs = document.querySelectorAll('.form-box input');
            let isReadOnly = inputs[0].readOnly;
            inputs.forEach(input => input.readOnly = !isReadOnly);
            this.textContent = isReadOnly ? 'Sauvegarder' : 'Modifier';
        });
        document.getElementById('deconnexion').addEventListener('click', function() {
            alert('Déconnexion');
        });
    </script>
</body>
</html>
