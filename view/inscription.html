<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - SportFuel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .panel.signup-mode { transform: translateX(100%); }
        .image-area { 
            background-image: url('img1.png') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            transform: translateX(-30px); 
            opacity: 0; 
            animation: fadeInLeft 0.7s forwards; 
        }
        .form-section { transform: translateX(30px); opacity: 0; animation: fadeInRight 0.7s forwards; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="image-area">
            <h3>Hello friends, ready to start?</h3>
        </div>
        <div class="form-section">
            <div class="form-box">
                <h2>Inscription</h2>
                <form id="inscriptionForm" action="../controller/AuthController.php?action=inscription" method="POST" novalidate>
                    <input type="text" name="nom" id="nom" placeholder="👤 Nom complet">
                    <input type="text" name="email" id="email" placeholder="📧 Email">
                    <select name="role" id="role" style="font-family: 'Poppins', sans-serif;">
                        <option value="Sportif">🏃 Je m'inscris en tant que Sportif</option>
                        <option value="Admin">⭐ Je m'inscris en tant qu'Administrateur</option>
                    </select>
                    <input type="password" name="password" id="password" placeholder="🔒 Mot de passe">
                    <input type="password" name="confirmPassword" id="confirmPassword" placeholder="🔐 Confirmer mot de passe">
                    <input type="text" name="age" id="age" placeholder="📅 Age">
                    <input type="text" name="poids" id="poids" placeholder="⚖️ Poids (kg)">
                    <input type="text" name="taille" id="taille" placeholder="📏 Taille (cm)">
                    <button type="submit">S'inscrire</button>
                </form>
                <a class="link-btn" href="connexion.html">Déjà un compte ? Se connecter</a>
            </div>
        </div>
    </div>
    <script src="inscription.js"></script>
</body>
</html>
